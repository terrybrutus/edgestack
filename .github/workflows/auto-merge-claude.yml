name: Auto-merge Claude branch

# When Claude Code pushes to any claude/* branch, open a PR into main
# (if one isn't already open) and merge it immediately.
# No branch protection rules needed — merges directly.

on:
  push:
    branches:
      - "claude/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Open PR if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "Claude: ${{ github.ref_name }}" \
            --body "Auto-generated from a Claude Code session." \
            --repo "${{ github.repository }}" \
          || echo "PR already exists — continuing."

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --json url -q .url)
          gh pr merge "$PR_URL" --merge --delete-branch=false
